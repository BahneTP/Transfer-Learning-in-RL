# @package _global_
defaults:
  - override /algorithm: atari100k_dummy
  - override /environment: atari100k_train
  - override /environment@eval_environment: atari100k_dummy_eval
  - override /logger: wandb
  - _self_

atari:
  game: BattleZone

trainer:
  total_frames: 20
  seed: 1
  accelerator: gpu
  devices: [0]
  num_envs: 1
  log_every_n_steps: 10
  eval_every_n_steps: 10
  num_eval_episodes: 1
  final_num_eval_episodes: 1
