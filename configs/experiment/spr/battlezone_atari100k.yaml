# @package _global_
# Self-Predictive Representations on Atari 100K BattleZone.
defaults:
  - override /algorithm: spr_atari100k
  - override /environment: battlezone_atari100k_train
  - override /environment@eval_environment: battlezone_atari100k_eval
  - override /logger: tensorboard
  - _self_

trainer:
  total_frames: 100_000
  seed: 1
  accelerator: gpu
  devices: [0]
  num_envs: 1
  log_every_n_steps: 1_000
