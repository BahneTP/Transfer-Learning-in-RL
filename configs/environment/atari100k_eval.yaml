name: ALE/${atari.game}-v5
gym_backend: gymnasium
gym_kwargs:
  frameskip: 1
  repeat_action_probability: 0.0
  disable_env_checker: true
  from_pixels: true
  pixels_only: false
  categorical_action_encoding: false

# Evaluation keeps true game-over episodes and unclipped rewards.
transforms:
  - _target_: torchrl.envs.NoopResetEnv
    noops: 30
    random: true
  - _target_: src.environments.transforms.MaxAndSkipTransform
    frame_skip: 4
    pixel_key: pixels
  - _target_: torchrl.envs.ToTensorImage
  - _target_: torchrl.envs.GrayScale
  - _target_: src.environments.transforms.OpenCVResizeTransform
    w: 84
    h: 84
  - _target_: torchrl.envs.RewardSum
  - _target_: torchrl.envs.StepCounter
    max_steps: 27000
