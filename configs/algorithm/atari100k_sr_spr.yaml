_target_: src.algorithms.atari100k.SRSPRAlgorithm

seed: ${trainer.seed}
obs_key: pixels
replay_capacity: 200_000
frames_per_batch: 1
max_frames_per_traj: -1

gamma: 0.99
update_horizon: 10
max_update_horizon: 10
min_gamma: 0.99
cycle_steps: 0
min_replay_history: 2000
target_update_period: 1
target_update_tau: 0.005
epsilon_train: 0.0
epsilon_eval: 0.001
epsilon_decay_period: 2001
noisy: false
dueling: true
double_dqn: true
distributional: true
replay_ratio: 64
batch_size: 32
learning_rate: 1e-4
adam_eps: 1.5e-4
weight_decay: 0.0
encoder_type: dqn
hidden_dim: 512
width_scale: 1
resnet18_weights: null
transfer_mode: none
probe_type: flatten
encoder_lr_scale: 1.0
freeze_encoder_bn: false
lora_rank: 8
lora_alpha: 16.0
lora_dropout: 0.0
renormalize_output: true
data_augmentation: true
batches_to_group: 2
spr_weight: 5.0
jumps: 5
reset_every: 5000
no_resets_after: 100000
shrink_perturb_keys: [encoder, transition_model]
shrink_factor: 0.8
perturb_factor: 0.2
reset_projection: true
reset_encoder: false
reset_noise: true
reset_head: true
reset_target: true
target_action_selection: true
protect_encoder_from_reset: false
