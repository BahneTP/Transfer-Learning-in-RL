_target_: src.algorithms.atari100k.DERAtari100KAlgorithm

obs_key: pixels
replay_capacity: 200_000
observation_shape: [4, 84, 84]

# DER / Atari 100K reference scale.
gamma: 0.99
update_horizon: 10
min_replay_history: 1600
target_update_period: 8000
epsilon_train: 0.01
epsilon_eval: 0.001
epsilon_decay_period: 2000
replay_ratio: 32
batch_size: 32
learning_rate: 0.0001
adam_eps: 0.00015
weight_decay: 0.0
max_grad_norm: 10.0
noisy: true
dueling: true
double_dqn: true

# One collector frame maps to one DER environment step/update opportunity.
frames_per_batch: 1
max_frames_per_traj: -1
seed: ${trainer.seed}
